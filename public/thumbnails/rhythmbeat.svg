<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f23"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)"/>
  <!-- レーン -->
  <rect x="30" y="20" width="35" height="160" fill="rgba(239,68,68,0.2)" stroke="rgba(239,68,68,0.5)" stroke-width="1"/>
  <rect x="65" y="20" width="35" height="160" fill="rgba(34,197,94,0.2)" stroke="rgba(34,197,94,0.5)" stroke-width="1"/>
  <rect x="100" y="20" width="35" height="160" fill="rgba(59,130,246,0.2)" stroke="rgba(59,130,246,0.5)" stroke-width="1"/>
  <rect x="135" y="20" width="35" height="160" fill="rgba(245,158,11,0.2)" stroke="rgba(245,158,11,0.5)" stroke-width="1"/>
  <!-- 判定ライン -->
  <rect x="30" y="150" width="140" height="4" fill="url(#judgeLine)"/>
  <defs>
    <linearGradient id="judgeLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="33%" style="stop-color:#22c55e"/>
      <stop offset="66%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- ノート -->
  <circle cx="47.5" cy="60" r="12" fill="#ef4444" filter="url(#glow)"/>
  <circle cx="82.5" cy="100" r="12" fill="#22c55e" filter="url(#glow)"/>
  <circle cx="117.5" cy="40" r="12" fill="#3b82f6" filter="url(#glow)"/>
  <circle cx="152.5" cy="80" r="12" fill="#f59e0b" filter="url(#glow)"/>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- キー表示 -->
  <rect x="37" y="162" width="20" height="20" rx="4" fill="#ef4444" opacity="0.6"/>
  <rect x="72" y="162" width="20" height="20" rx="4" fill="#22c55e" opacity="0.6"/>
  <rect x="107" y="162" width="20" height="20" rx="4" fill="#3b82f6" opacity="0.6"/>
  <rect x="142" y="162" width="20" height="20" rx="4" fill="#f59e0b" opacity="0.6"/>
  <text x="47" y="177" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">D</text>
  <text x="82" y="177" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">F</text>
  <text x="117" y="177" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">J</text>
  <text x="152" y="177" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">K</text>
</svg>
