<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="btn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ff8c00"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)"/>
  <circle cx="100" cy="90" r="50" fill="url(#btn)"/>
  <text x="100" y="100" text-anchor="middle" font-family="Arial Black" font-size="20" fill="#1a1a2e">CLICK!</text>
  <text x="100" y="160" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#ffd700">+1</text>
  <text x="100" y="185" text-anchor="middle" font-family="Arial" font-size="12" fill="#888">Click Master</text>
