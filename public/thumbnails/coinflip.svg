<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="coinbg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="30%" style="stop-color:#FFA500"/>
      <stop offset="70%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="360" fill="url(#coinbg)"/>
  <!-- 光の演出 -->
  <circle cx="320" cy="180" r="140" fill="rgba(255,215,0,0.1)"/>
  <circle cx="320" cy="180" r="100" fill="rgba(255,215,0,0.1)"/>
  <!-- コイン -->
  <ellipse cx="320" cy="180" rx="95" ry="95" fill="url(#gold)" filter="url(#glow)"/>
  <ellipse cx="320" cy="180" rx="80" ry="80" fill="none" stroke="#B8860B" stroke-width="4"/>
  <ellipse cx="320" cy="180" rx="70" ry="70" fill="none" stroke="#DAA520" stroke-width="2"/>
  <!-- コインの模様 -->
  <circle cx="320" cy="180" r="50" fill="none" stroke="#B8860B" stroke-width="2"/>
  <text x="320" y="195" font-size="48" font-weight="bold" fill="#B8860B" text-anchor="middle" font-family="serif">$</text>
  <!-- 光沢 -->
  <ellipse cx="290" cy="140" rx="25" ry="15" fill="rgba(255,255,255,0.3)" transform="rotate(-30,290,140)"/>
  <!-- 疑問符 -->
  <text x="520" y="100" font-size="60" font-weight="bold" fill="#4ECDC4" text-anchor="middle">?</text>
  <text x="120" y="280" font-size="60" font-weight="bold" fill="#FF6B6B" text-anchor="middle">?</text>
  <!-- テキスト -->
  <text x="320" y="330" font-size="24" font-weight="bold" fill="#FFD700" text-anchor="middle">HEADS or TAILS</text>
</svg>
