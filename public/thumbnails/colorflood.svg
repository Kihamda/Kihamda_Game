  <!-- Flood effect from top-left -->
  <g transform="translate(60, 40)">
    <rect x="0" y="0" width="32" height="32" rx="2" fill="#e74c3c" stroke="#fff" stroke-width="2"/>
    <rect x="34" y="0" width="32" height="32" rx="2" fill="#e74c3c" stroke="#fff" stroke-width="2"/>
