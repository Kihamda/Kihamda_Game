  <text x="480" y="210" fill="#2ecc71" font-family="sans-serif" font-size="28" font-weight="700">48%</text>
  
  <!-- Progress bar -->
  <rect x="380" y="230" width="200" height="10" rx="5" fill="rgba(255,255,255,0.1)"/>
  <rect x="380" y="230" width="96" height="10" rx="5" fill="#2ecc71"/>
  
  <!-- Title -->
  <text x="24" y="340" fill="#fff" font-family="sans-serif" font-size="26" font-weight="700">
    <tspan fill="#e74c3c">C</tspan><tspan fill="#f1c40f">o</tspan><tspan fill="#2ecc71">l</tspan><tspan fill="#3498db">o</tspan><tspan fill="#9b59b6">r</tspan> Flood
