<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" fill="none">
  <rect width="640" height="360" fill="#0f0f23"/>
  
  <!-- 5x5 Grid -->
  <g transform="translate(185, 50)">
    <!-- Row 0 -->
    <rect x="0" y="0" width="48" height="48" rx="4" fill="#ffc800" filter="url(#glow)"/>
    <rect x="54" y="0" width="48" height="48" rx="4" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
    <rect x="108" y="0" width="48" height="48" rx="4" fill="#ffc800" filter="url(#glow)"/>
    <rect x="162" y="0" width="48" height="48" rx="4" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
    <rect x="216" y="0" width="48" height="48" rx="4" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
    
    <!-- Row 1 -->
    <rect x="0" y="54" width="48" height="48" rx="4" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
    <rect x="54" y="54" width="48" height="48" rx="4" fill="#ffc800" filter="url(#glow)"/>
    <rect x="108" y="54" width="48" height="48" rx="4" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
    <rect x="162" y="54" width="48" height="48" rx="4" fill="#ffc800" filter="url(#glow)"/>
    <rect x="216" y="54" width="48" height="48" rx="4" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
    
    <!-- Row 2 -->
    <rect x="0" y="108" width="48" height="48" rx="4" fill="#ffc800" filter="url(#glow)"/>
    <rect x="54" y="108" width="48" height="48" rx="4" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
    <rect x="108" y="108" width="48" height="48" rx="4" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
    <rect x="162" y="108" width="48" height="48" rx="4" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
    <rect x="216" y="108" width="48" height="48" rx="4" fill="#ffc800" filter="url(#glow)"/>
    
    <!-- Row 3 -->
    <rect x="0" y="162" width="48" height="48" rx="4" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
    <rect x="54" y="162" width="48" height="48" rx="4" fill="#ffc800" filter="url(#glow)"/>
    <rect x="108" y="162" width="48" height="48" rx="4" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
    <rect x="162" y="162" width="48" height="48" rx="4" fill="#ffc800" filter="url(#glow)"/>
    <rect x="216" y="162" width="48" height="48" rx="4" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
    
    <!-- Row 4 -->
    <rect x="0" y="216" width="48" height="48" rx="4" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
    <rect x="54" y="216" width="48" height="48" rx="4" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
    <rect x="108" y="216" width="48" height="48" rx="4" fill="#ffc800" filter="url(#glow)"/>
    <rect x="162" y="216" width="48" height="48" rx="4" fill="#1a1a2a" stroke="#333" stroke-width="1"/>
    <rect x="216" y="216" width="48" height="48" rx="4" fill="#ffc800" filter="url(#glow)"/>
  </g>
  
  <!-- Tap cursor pointer -->
  <circle cx="460" cy="130" r="14" fill="#fff" opacity="0.9"/>
  <circle cx="460" cy="130" r="20" stroke="#fff" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Stats display -->
  <text x="480" y="220" fill="#888" font-family="sans-serif" font-size="14">MOVES</text>
  <text x="480" y="250" fill="#ffd700" font-family="sans-serif" font-size="28" font-weight="700">8</text>
  
  <!-- Title -->
  <text x="24" y="340" fill="#ffd700" font-family="sans-serif" font-size="26" font-weight="700">Lights Out</text>
  
  <!-- Glow filter -->
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
