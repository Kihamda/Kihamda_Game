<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>
  
  <!-- Math symbols scattered -->
  <text x="80" y="80" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#818cf8" opacity="0.4">+</text>
  <text x="540" y="100" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#818cf8" opacity="0.4">−</text>
  <text x="100" y="300" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#818cf8" opacity="0.4">×</text>
  <text x="520" y="320" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#818cf8" opacity="0.4">=</text>
  
  <!-- Numbers scattered -->
  <text x="160" y="120" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#4ade80" opacity="0.3">7</text>
  <text x="460" y="90" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#4ade80" opacity="0.3">12</text>
  <text x="180" y="280" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#4ade80" opacity="0.3">9</text>
  <text x="440" y="290" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#4ade80" opacity="0.3">5</text>
  
  <!-- Main equation box -->
  <rect x="120" y="130" width="400" height="100" rx="16" fill="rgba(30,41,59,0.9)" stroke="#475569" stroke-width="2"/>
  
  <!-- Equation: 8 + 15 = ? -->
  <text x="160" y="200" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="#e2e8f0">8</text>
  <text x="220" y="200" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#818cf8">+</text>
  <text x="270" y="200" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="#e2e8f0">15</text>
  <text x="370" y="200" font-family="Arial, sans-serif" font-size="48" font-weight="700" fill="#64748b">=</text>
  <text x="420" y="200" font-family="Arial, sans-serif" font-size="56" font-weight="900" fill="url(#gold)">?</text>
  
  <!-- Title -->
  <text x="320" y="300" font-family="Arial, sans-serif" font-size="36" font-weight="900" fill="#f8fafc" text-anchor="middle">🧮 Math Blitz</text>
  
  <!-- Timer indicator -->
  <rect x="520" y="140" width="60" height="30" rx="6" fill="rgba(248,113,113,0.2)" stroke="#f87171" stroke-width="1"/>
  <text x="550" y="162" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#f87171" text-anchor="middle">60s</text>
</svg>
