<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#555"/>
      <stop offset="100%" style="stop-color:#333"/>
    </linearGradient>
  </defs>
  <!-- Background grass -->
  <rect width="200" height="200" fill="#2a5f2a"/>
  <!-- Road -->
  <rect x="40" y="0" width="120" height="200" fill="url(#roadGrad)"/>
  <!-- Road edges -->
  <rect x="35" y="0" width="5" height="200" fill="#fff"/>
  <rect x="160" y="0" width="5" height="200" fill="#fff"/>
  <!-- Lane markings -->
  <g stroke="#fff" stroke-width="2" stroke-dasharray="15,10">
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/>
  </g>
  <!-- Player car (red) -->
  <g>
    <rect x="87" y="130" width="26" height="50" rx="5" fill="#ff4444"/>
    <rect x="91" y="138" width="18" height="12" rx="2" fill="#223"/>
    <rect x="83" y="138" width="4" height="12" fill="#222"/>
    <rect x="113" y="138" width="4" height="12" fill="#222"/>
    <rect x="83" y="160" width="4" height="12" fill="#222"/>
    <rect x="113" y="160" width="4" height="12" fill="#222"/>
    <rect x="91" y="133" width="6" height="3" fill="#ffff88"/>
    <rect x="103" y="133" width="6" height="3" fill="#ffff88"/>
  </g>
  <!-- Enemy car (blue) -->
  <g>
    <rect x="47" y="30" width="26" height="50" rx="5" fill="#4444ff"/>
    <rect x="51" y="60" width="18" height="12" rx="2" fill="#334"/>
    <rect x="43" y="40" width="4" height="12" fill="#222"/>
    <rect x="73" y="40" width="4" height="12" fill="#222"/>
    <rect x="43" y="60" width="4" height="12" fill="#222"/>
    <rect x="73" y="60" width="4" height="12" fill="#222"/>
    <rect x="51" y="74" width="6" height="3" fill="#ff8888"/>
    <rect x="63" y="74" width="6" height="3" fill="#ff8888"/>
  </g>
  <!-- Enemy car (green) -->
  <g>
    <rect x="127" y="60" width="26" height="50" rx="5" fill="#44ff44"/>
    <rect x="131" y="90" width="18" height="12" rx="2" fill="#334"/>
    <rect x="123" y="70" width="4" height="12" fill="#222"/>
    <rect x="153" y="70" width="4" height="12" fill="#222"/>
    <rect x="123" y="90" width="4" height="12" fill="#222"/>
    <rect x="153" y="90" width="4" height="12" fill="#222"/>
    <rect x="131" y="104" width="6" height="3" fill="#ff8888"/>
    <rect x="143" y="104" width="6" height="3" fill="#ff8888"/>
  </g>
</svg>