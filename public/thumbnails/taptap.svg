<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="24" y="44" fill="#f8fafc" font-family="sans-serif" font-size="32" font-weight="900">👆 タップタップ</text>
  
  <!-- HUD -->
  <text x="24" y="340" fill="#fbbf24" font-family="sans-serif" font-size="16" font-weight="700">💰 2450</text>
  <text x="550" y="340" fill="#f8fafc" font-family="sans-serif" font-size="16" font-weight="700">⏱️ 18s</text>
  
  <!-- Normal targets (green) -->
  <circle cx="150" cy="160" r="35" fill="url(#green)" stroke="#4ade80" stroke-width="3"/>
  <text x="150" y="168" text-anchor="middle" fill="white" font-family="sans-serif" font-size="20" font-weight="700">●</text>
  
  <circle cx="480" cy="120" r="28" fill="url(#green)" stroke="#4ade80" stroke-width="3"/>
  <text x="480" y="128" text-anchor="middle" fill="white" font-family="sans-serif" font-size="16" font-weight="700">●</text>
  
  <circle cx="380" cy="260" r="32" fill="url(#green)" stroke="#4ade80" stroke-width="3"/>
  <text x="380" y="268" text-anchor="middle" fill="white" font-family="sans-serif" font-size="18" font-weight="700">●</text>
  
  <!-- Bonus target (gold) -->
  <circle cx="300" cy="150" r="40" fill="url(#gold)" stroke="#fde047" stroke-width="3"/>
  <text x="300" y="158" text-anchor="middle" fill="white" font-family="sans-serif" font-size="24" font-weight="700">★</text>
  
  <!-- Miss target (red) -->
  <circle cx="520" cy="220" r="30" fill="url(#red)" stroke="#f87171" stroke-width="3"/>
  <text x="520" y="228" text-anchor="middle" fill="white" font-family="sans-serif" font-size="18" font-weight="700">✕</text>
  
  <!-- Score popups -->
  <text x="200" y="130" fill="#4ade80" font-family="sans-serif" font-size="22" font-weight="700">+200</text>
  <text x="250" y="90" fill="#fbbf24" font-family="sans-serif" font-size="24" font-weight="700">+600</text>
  
  <!-- Tap effect rings -->
  <circle cx="200" cy="100" r="50" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.3"/>
  <circle cx="200" cy="100" r="35" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.5"/>
</svg>