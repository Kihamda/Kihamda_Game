<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="20"/>
  
  <!-- Grid -->
  <g fill="none" stroke="#334155" stroke-width="1">
    <rect x="30" y="30" width="140" height="140" rx="4"/>
    <line x1="65" y1="30" x2="65" y2="170"/>
    <line x1="100" y1="30" x2="100" y2="170"/>
    <line x1="135" y1="30" x2="135" y2="170"/>
    <line x1="30" y1="65" x2="170" y2="65"/>
    <line x1="30" y1="100" x2="170" y2="100"/>
    <line x1="30" y1="135" x2="170" y2="135"/>
  </g>
  
  <!-- Letters -->
  <g font-family="Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" dominant-baseline="central">
    <text x="47.5" y="47.5" fill="#60a5fa">W</text>
    <text x="82.5" y="47.5" fill="#60a5fa">O</text>
    <text x="117.5" y="47.5" fill="#60a5fa">R</text>
    <text x="152.5" y="47.5" fill="#60a5fa">D</text>
    <text x="47.5" y="82.5" fill="#94a3b8">K</text>
    <text x="82.5" y="82.5" fill="#94a3b8">A</text>
    <text x="117.5" y="82.5" fill="#94a3b8">M</text>
    <text x="152.5" y="82.5" fill="#94a3b8">E</text>
    <text x="47.5" y="117.5" fill="#94a3b8">U</text>
    <text x="82.5" y="117.5" fill="#94a3b8">T</text>
    <text x="117.5" y="117.5" fill="#94a3b8">Z</text>
    <text x="152.5" y="117.5" fill="#94a3b8">Q</text>
    <text x="47.5" y="152.5" fill="#94a3b8">P</text>
    <text x="82.5" y="152.5" fill="#94a3b8">L</text>
    <text x="117.5" y="152.5" fill="#94a3b8">X</text>
    <text x="152.5" y="152.5" fill="#94a3b8">Y</text>
  </g>
  
  <!-- Selection highlight -->
  <rect x="30" y="30" width="140" height="35" fill="#3b82f6" fill-opacity="0.3" rx="4"/>
  
  <!-- Magnifying glass icon -->
  <g transform="translate(160, 10)">
    <circle cx="15" cy="15" r="10" fill="none" stroke="#fbbf24" stroke-width="3"/>
    <line x1="22" y1="22" x2="30" y2="30" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
