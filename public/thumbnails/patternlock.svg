<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f1520"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>
  
  <!-- 3x3 Grid -->
  <g transform="translate(220, 80)">
    <!-- Dots -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="#5a6a7a" stroke-width="3"/>
    <circle cx="0" cy="0" r="6" fill="#5a6a7a"/>
    
    <circle cx="100" cy="0" r="20" fill="none" stroke="#00ffff" stroke-width="3" filter="url(#glow)"/>
    <circle cx="100" cy="0" r="14" fill="#00ffff"/>
    
    <circle cx="200" cy="0" r="20" fill="none" stroke="#00dddd" stroke-width="3"/>
    <circle cx="200" cy="0" r="6" fill="#00dddd"/>
    
    <circle cx="0" cy="100" r="20" fill="none" stroke="#5a6a7a" stroke-width="3"/>
    <circle cx="0" cy="100" r="6" fill="#5a6a7a"/>
    
    <circle cx="100" cy="100" r="20" fill="none" stroke="#00dddd" stroke-width="3"/>
    <circle cx="100" cy="100" r="6" fill="#00dddd"/>
    
    <circle cx="200" cy="100" r="20" fill="none" stroke="#00dddd" stroke-width="3"/>
    <circle cx="200" cy="100" r="6" fill="#00dddd"/>
    
    <circle cx="0" cy="200" r="20" fill="none" stroke="#00dddd" stroke-width="3"/>
    <circle cx="0" cy="200" r="6" fill="#00dddd"/>
    
    <circle cx="100" cy="200" r="20" fill="none" stroke="#5a6a7a" stroke-width="3"/>
    <circle cx="100" cy="200" r="6" fill="#5a6a7a"/>
    
    <circle cx="200" cy="200" r="20" fill="none" stroke="#5a6a7a" stroke-width="3"/>
    <circle cx="200" cy="200" r="6" fill="#5a6a7a"/>
    
    <!-- Pattern Line -->
    <path d="M100,0 L200,0 L200,100 L0,200" fill="none" stroke="#00ffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  </g>
  
  <!-- Title -->
  <text x="320" y="330" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#fff" text-anchor="middle">Pattern Lock</text>
</svg>
