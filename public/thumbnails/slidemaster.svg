<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="tile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e6e6e6"/>
    </linearGradient>
    <linearGradient id="tileHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffecd2"/>
      <stop offset="100%" stop-color="#fcb69f"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" rx="20" fill="url(#bg)"/>
  
  <!-- Board Background -->
  <rect x="25" y="25" width="150" height="150" rx="10" fill="rgba(0,0,0,0.2)"/>
  
  <!-- Tiles -->
  <!-- Row 1 -->
  <rect x="32" y="32" width="30" height="30" rx="4" fill="url(#tile)"/>
  <text x="47" y="53" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">1</text>
  
  <rect x="66" y="32" width="30" height="30" rx="4" fill="url(#tile)"/>
  <text x="81" y="53" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">2</text>
  
  <rect x="100" y="32" width="30" height="30" rx="4" fill="url(#tile)"/>
  <text x="115" y="53" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">3</text>
  
  <rect x="134" y="32" width="30" height="30" rx="4" fill="url(#tile)"/>
  <text x="149" y="53" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">4</text>
  
  <!-- Row 2 -->
  <rect x="32" y="66" width="30" height="30" rx="4" fill="url(#tile)"/>
  <text x="47" y="87" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">5</text>
  
  <rect x="66" y="66" width="30" height="30" rx="4" fill="url(#tile)"/>
  <text x="81" y="87" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">6</text>
  
  <rect x="100" y="66" width="30" height="30" rx="4" fill="url(#tile)"/>
  <text x="115" y="87" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">7</text>
  
  <rect x="134" y="66" width="30" height="30" rx="4" fill="url(#tile)"/>
  <text x="149" y="87" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">8</text>
  
  <!-- Row 3 -->
  <rect x="32" y="100" width="30" height="30" rx="4" fill="url(#tile)"/>
  <text x="47" y="121" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">9</text>
  
  <rect x="66" y="100" width="30" height="30" rx="4" fill="url(#tileHighlight)"/>
  <text x="81" y="121" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">10</text>
  
  <rect x="100" y="100" width="30" height="30" rx="4" fill="url(#tile)"/>
  <text x="115" y="121" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">11</text>
  
  <rect x="134" y="100" width="30" height="30" rx="4" fill="url(#tile)"/>
  <text x="149" y="121" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">12</text>
  
  <!-- Row 4 -->
  <rect x="32" y="134" width="30" height="30" rx="4" fill="url(#tile)"/>
  <text x="47" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">13</text>
  
  <rect x="66" y="134" width="30" height="30" rx="4" fill="url(#tile)"/>
  <text x="81" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">14</text>
  
  <!-- Empty space at (2,3) - highlighted movable tile at (1,2) shown above -->
  
  <rect x="134" y="134" width="30" height="30" rx="4" fill="url(#tile)"/>
  <text x="149" y="155" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">15</text>
</svg>
