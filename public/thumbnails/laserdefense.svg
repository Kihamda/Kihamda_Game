<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="laser" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff0000"/>
      <stop offset="100%" style="stop-color:#ff6600"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)"/>
  
  <!-- Grid lines -->
  <g stroke="#00ff8820" stroke-width="1">
    <line x1="40" y1="40" x2="40" y2="160"/>
    <line x1="70" y1="40" x2="70" y2="160"/>
    <line x1="100" y1="40" x2="100" y2="160"/>
    <line x1="130" y1="40" x2="130" y2="160"/>
    <line x1="160" y1="40" x2="160" y2="160"/>
    <line x1="40" y1="40" x2="160" y2="40"/>
    <line x1="40" y1="70" x2="160" y2="70"/>
    <line x1="40" y1="100" x2="160" y2="100"/>
    <line x1="40" y1="130" x2="160" y2="130"/>
    <line x1="40" y1="160" x2="160" y2="160"/>
  </g>
  
  <!-- Laser source -->
  <rect x="35" y="95" width="20" height="20" fill="#ff4444" rx="3"/>
  <polygon points="50,105 60,105 55,100" fill="#ff6666"/>
  
  <!-- Laser beam -->
  <g filter="url(#glow)">
    <line x1="55" y1="105" x2="85" y2="105" stroke="#ff0000" stroke-width="4"/>
    <line x1="85" y1="105" x2="85" y2="55" stroke="#ff0000" stroke-width="4"/>
    <line x1="85" y1="55" x2="145" y2="55" stroke="#ff0000" stroke-width="4"/>
  </g>
  
  <!-- Mirror 1 -->
  <rect x="77" y="97" width="16" height="16" fill="#00ccff30" stroke="#00ccff" stroke-width="2" rx="2"/>
  <line x1="80" y1="110" x2="90" y2="100" stroke="#00ccff" stroke-width="3"/>
  
  <!-- Target -->
  <circle cx="145" cy="55" r="12" fill="none" stroke="#00ff88" stroke-width="2"/>
  <circle cx="145" cy="55" r="6" fill="#00ff88"/>
  
  <!-- Decorative mirrors -->
  <rect x="117" y="127" width="16" height="16" fill="#00ccff20" stroke="#00ccff60" stroke-width="1" rx="2"/>
  <line x1="120" y1="140" x2="130" y2="130" stroke="#00ccff60" stroke-width="2"/>
</svg>
