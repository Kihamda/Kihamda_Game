<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#2e8b57"/>
  <!-- Grass pattern -->
  <rect x="30" y="30" width="140" height="140" fill="#228b22" rx="8"/>
  <!-- Hole -->
  <circle cx="130" cy="70" r="12" fill="#1a1a1a"/>
  <circle cx="130" cy="70" r="8" fill="#333"/>
  <!-- Flag -->
  <line x1="130" y1="58" x2="130" y2="30" stroke="#ccc" stroke-width="2"/>
  <polygon points="130,30 150,38 130,46" fill="#ff4444"/>
  <!-- Golf ball -->
  <circle cx="70" cy="130" r="10" fill="#fff" stroke="#333" stroke-width="2"/>
  <!-- Aim line -->
  <line x1="70" y1="130" x2="110" y2="90" stroke="#ff6b6b" stroke-width="2" stroke-dasharray="4,2" opacity="0.8"/>
</svg>