<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="lane" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#deb887"/>
      <stop offset="100%" style="stop-color:#c4a574"/>
    </linearGradient>
    <linearGradient id="ball" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d566e"/>
      <stop offset="100%" style="stop-color:#1a252f"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="200" height="200" fill="#1a1a2e"/>
  
  <!-- レーン -->
  <rect x="50" y="20" width="100" height="160" fill="url(#lane)" rx="5"/>
  
  <!-- ガター -->
  <rect x="40" y="20" width="10" height="160" fill="#8b4513"/>
  <rect x="150" y="20" width="10" height="160" fill="#8b4513"/>
  
  <!-- ピン配置 (三角形) -->
  <!-- 手前4本 -->
  <circle cx="72" cy="70" r="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <circle cx="90" cy="70" r="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <circle cx="108" cy="70" r="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <circle cx="126" cy="70" r="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <!-- 3本 -->
  <circle cx="81" cy="52" r="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <circle cx="99" cy="52" r="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <circle cx="117" cy="52" r="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <!-- 2本 -->
  <circle cx="90" cy="36" r="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <circle cx="108" cy="36" r="8" fill="#fff" stroke="#333" stroke-width="2"/>
  <!-- 頭1本 -->
  <circle cx="99" cy="22" r="6" fill="#fff" stroke="#333" stroke-width="2"/>
  
  <!-- ピンの赤帯 -->
  <circle cx="72" cy="67" r="3" fill="#e74c3c"/>
  <circle cx="90" cy="67" r="3" fill="#e74c3c"/>
  <circle cx="108" cy="67" r="3" fill="#e74c3c"/>
  <circle cx="126" cy="67" r="3" fill="#e74c3c"/>
  <circle cx="81" cy="49" r="3" fill="#e74c3c"/>
  <circle cx="99" cy="49" r="3" fill="#e74c3c"/>
  <circle cx="117" cy="49" r="3" fill="#e74c3c"/>
  <circle cx="90" cy="33" r="3" fill="#e74c3c"/>
  <circle cx="108" cy="33" r="3" fill="#e74c3c"/>
  
  <!-- ファウルライン -->
  <line x1="50" y1="130" x2="150" y2="130" stroke="#e74c3c" stroke-width="3"/>
  
  <!-- ボール -->
  <circle cx="100" cy="155" r="18" fill="url(#ball)"/>
  <circle cx="95" cy="150" r="4" fill="#1a1a2e"/>
  <circle cx="105" cy="150" r="4" fill="#1a1a2e"/>
  <circle cx="100" cy="160" r="4" fill="#1a1a2e"/>
  
  <!-- STRIKE エフェクト -->
  <text x="100" y="190" text-anchor="middle" font-size="14" font-weight="bold" fill="#f1c40f">⚡ STRIKE</text>
</svg>
