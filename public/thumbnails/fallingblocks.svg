<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)"/>
  
  <!-- Grid lines -->
  <g stroke="#333" stroke-width="0.5">
    <line x1="40" y1="20" x2="40" y2="180"/>
    <line x1="60" y1="20" x2="60" y2="180"/>
    <line x1="80" y1="20" x2="80" y2="180"/>
    <line x1="100" y1="20" x2="100" y2="180"/>
    <line x1="120" y1="20" x2="120" y2="180"/>
    <line x1="140" y1="20" x2="140" y2="180"/>
    <line x1="160" y1="20" x2="160" y2="180"/>
    <line x1="40" y1="40" x2="160" y2="40"/>
    <line x1="40" y1="60" x2="160" y2="60"/>
    <line x1="40" y1="80" x2="160" y2="80"/>
    <line x1="40" y1="100" x2="160" y2="100"/>
    <line x1="40" y1="120" x2="160" y2="120"/>
    <line x1="40" y1="140" x2="160" y2="140"/>
    <line x1="40" y1="160" x2="160" y2="160"/>
  </g>
  
  <!-- T-piece (purple) falling -->
  <rect x="80" y="40" width="18" height="18" rx="2" fill="#9c27b0" stroke="#fff" stroke-opacity="0.3"/>
  <rect x="60" y="58" width="18" height="18" rx="2" fill="#9c27b0" stroke="#fff" stroke-opacity="0.3"/>
  <rect x="80" y="58" width="18" height="18" rx="2" fill="#9c27b0" stroke="#fff" stroke-opacity="0.3"/>
  <rect x="100" y="58" width="18" height="18" rx="2" fill="#9c27b0" stroke="#fff" stroke-opacity="0.3"/>
  
  <!-- Landed blocks -->
  <!-- I-piece (cyan) -->
  <rect x="40" y="160" width="18" height="18" rx="2" fill="#00f5ff" stroke="#fff" stroke-opacity="0.3"/>
  <rect x="60" y="160" width="18" height="18" rx="2" fill="#00f5ff" stroke="#fff" stroke-opacity="0.3"/>
  <rect x="80" y="160" width="18" height="18" rx="2" fill="#00f5ff" stroke="#fff" stroke-opacity="0.3"/>
  <rect x="100" y="160" width="18" height="18" rx="2" fill="#00f5ff" stroke="#fff" stroke-opacity="0.3"/>
  
  <!-- O-piece (yellow) -->
  <rect x="120" y="140" width="18" height="18" rx="2" fill="#ffeb3b" stroke="#fff" stroke-opacity="0.3"/>
  <rect x="140" y="140" width="18" height="18" rx="2" fill="#ffeb3b" stroke="#fff" stroke-opacity="0.3"/>
  <rect x="120" y="160" width="18" height="18" rx="2" fill="#ffeb3b" stroke="#fff" stroke-opacity="0.3"/>
  <rect x="140" y="160" width="18" height="18" rx="2" fill="#ffeb3b" stroke="#fff" stroke-opacity="0.3"/>
  
  <!-- L-piece (orange) -->
  <rect x="40" y="140" width="18" height="18" rx="2" fill="#ff9800" stroke="#fff" stroke-opacity="0.3"/>
  <rect x="60" y="140" width="18" height="18" rx="2" fill="#ff9800" stroke="#fff" stroke-opacity="0.3"/>
  <rect x="80" y="140" width="18" height="18" rx="2" fill="#ff9800" stroke="#fff" stroke-opacity="0.3"/>
  <rect x="40" y="120" width="18" height="18" rx="2" fill="#ff9800" stroke="#fff" stroke-opacity="0.3"/>
  
  <!-- Board border -->
  <rect x="40" y="20" width="120" height="160" fill="none" stroke="#667eea" stroke-width="2" rx="2"/>
</svg>
