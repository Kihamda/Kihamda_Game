<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb"/>
      <stop offset="100%" style="stop-color:#e0f4ff"/>
    </linearGradient>
    <linearGradient id="cannon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a4a4a"/>
      <stop offset="100%" style="stop-color:#3a3a3a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#sky)"/>
  
  <!-- Ground -->
  <rect x="0" y="170" width="200" height="30" fill="#8b7355"/>
  <rect x="0" y="165" width="200" height="5" fill="#6b8e23"/>
  
  <!-- Obstacle -->
  <rect x="100" y="100" width="15" height="70" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="2"/>
  
  <!-- Target -->
  <circle cx="160" cy="150" r="20" fill="#ff4444"/>
  <circle cx="160" cy="150" r="14" fill="#fff"/>
  <circle cx="160" cy="150" r="8" fill="#ff4444"/>
  
  <!-- Cannon Base -->
  <circle cx="40" cy="150" r="18" fill="#5a4a3a"/>
  
  <!-- Cannon -->
  <g transform="translate(40, 150) rotate(-35)">
    <rect x="0" y="-8" width="40" height="16" fill="url(#cannon)" rx="2"/>
    <rect x="35" y="-10" width="8" height="20" fill="#2a2a2a" rx="1"/>
  </g>
  
  <!-- Trajectory -->
  <path d="M 65 130 Q 100 50 160 150" stroke="rgba(255,150,50,0.6)" stroke-width="3" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Cannonball -->
  <circle cx="95" cy="80" r="8" fill="#ff8800">
    <animate attributeName="opacity" values="1;0.6;1" dur="1s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title text -->
  <text x="100" y="30" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">CANNON</text>
  <text x="100" y="48" font-family="sans-serif" font-size="14" font-weight="bold" fill="#ff4444" text-anchor="middle">BLAST</text>
</svg>