<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffdd00"/>
      <stop offset="60%" stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#ff440044"/>
    </radialGradient>
    <radialGradient id="planetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#66aaff"/>
      <stop offset="100%" stop-color="#4488ff"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="#0a0a1a"/>
  
  <!-- Stars background -->
  <circle cx="30" cy="40" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="170" cy="30" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="150" cy="160" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="45" cy="170" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="180" cy="100" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="20" cy="120" r="1.5" fill="#ffffff" opacity="0.5"/>
  
  <!-- Orbit path -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="#4488ff" stroke-width="2" stroke-dasharray="8 6" opacity="0.3"/>
  
  <!-- Sun with glow -->
  <circle cx="100" cy="100" r="35" fill="url(#sunGlow)" opacity="0.5"/>
  <circle cx="100" cy="100" r="20" fill="#ffcc00"/>
  <circle cx="94" cy="94" r="6" fill="#ffee88" opacity="0.6"/>
  
  <!-- Planet -->
  <circle cx="100" cy="45" r="10" fill="url(#planetGlow)"/>
  <circle cx="96" cy="42" r="3" fill="#88ccff" opacity="0.5"/>
  
  <!-- Collectible star -->
  <polygon points="155,100 158,108 167,108 160,114 162,123 155,118 148,123 150,114 143,108 152,108" fill="#ffff66"/>
  
  <!-- Asteroids -->
  <ellipse cx="60" cy="60" rx="12" ry="10" fill="#665555" stroke="#887766" stroke-width="2" transform="rotate(-20 60 60)"/>
  <ellipse cx="150" cy="150" rx="8" ry="6" fill="#665555" stroke="#887766" stroke-width="1.5" transform="rotate(30 150 150)"/>
  <ellipse cx="40" cy="140" rx="10" ry="8" fill="#665555" stroke="#887766" stroke-width="2" transform="rotate(15 40 140)"/>
</svg>
