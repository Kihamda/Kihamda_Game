<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#000"/>
  <!-- Stars -->
  <circle cx="20" cy="30" r="1" fill="#444"/>
  <circle cx="80" cy="20" r="1" fill="#444"/>
  <circle cx="150" cy="40" r="1" fill="#444"/>
  <circle cx="180" cy="80" r="1" fill="#444"/>
  <circle cx="40" cy="120" r="1" fill="#444"/>
  <circle cx="170" cy="150" r="1" fill="#444"/>
  <circle cx="30" cy="180" r="1" fill="#444"/>
  <circle cx="120" cy="170" r="1" fill="#444"/>
  <!-- Ship -->
  <polygon points="100,60 85,85 92,80 108,80 115,85" fill="none" stroke="#fff" stroke-width="3"/>
  <!-- Asteroids -->
  <polygon points="45,50 55,45 65,55 60,70 45,68 40,60" fill="none" stroke="#fff" stroke-width="2"/>
  <polygon points="140,90 160,85 170,100 165,120 145,118 135,105" fill="none" stroke="#fff" stroke-width="2"/>
  <polygon points="50,130 65,125 75,140 70,155 55,150" fill="none" stroke="#fff" stroke-width="2"/>
  <!-- Bullets -->
  <circle cx="100" cy="45" r="3" fill="#fff"/>
  <circle cx="100" cy="30" r="3" fill="#fff"/>
</svg>
