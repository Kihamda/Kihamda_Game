<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)"/>
  
  <!-- Question mark circle -->
  <circle cx="100" cy="90" r="55" fill="white" opacity="0.15"/>
  <circle cx="100" cy="90" r="45" fill="white" opacity="0.2"/>
  
  <!-- Question mark -->
  <text x="100" y="110" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="white" text-anchor="middle">?</text>
  
  <!-- Numbers floating around -->
  <text x="30" y="45" font-family="Arial, sans-serif" font-size="18" fill="white" opacity="0.6">42</text>
  <text x="155" y="55" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.5">78</text>
  <text x="25" y="140" font-family="Arial, sans-serif" font-size="14" fill="white" opacity="0.4">15</text>
  <text x="165" y="135" font-family="Arial, sans-serif" font-size="15" fill="white" opacity="0.5">93</text>
  
  <!-- Title -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">数当てゲーム</text>
</svg>
