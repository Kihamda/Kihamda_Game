<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="iceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c4a6e"/>
      <stop offset="100%" style="stop-color:#082f49"/>
    </linearGradient>
    <linearGradient id="iceCell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae6fd"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
    <linearGradient id="wallCell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="goalCell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#iceBg)" rx="20"/>
  
  <!-- Grid (5x5) -->
  <!-- Row 0: walls -->
  <rect x="20" y="20" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  <rect x="52" y="20" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  <rect x="84" y="20" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  <rect x="116" y="20" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  <rect x="148" y="20" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  
  <!-- Row 1 -->
  <rect x="20" y="52" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  <rect x="52" y="52" width="30" height="30" fill="url(#iceCell)" rx="4"/>
  <rect x="84" y="52" width="30" height="30" fill="url(#iceCell)" rx="4"/>
  <rect x="116" y="52" width="30" height="30" fill="url(#iceCell)" rx="4"/>
  <rect x="148" y="52" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  
  <!-- Row 2 -->
  <rect x="20" y="84" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  <rect x="52" y="84" width="30" height="30" fill="url(#iceCell)" rx="4"/>
  <rect x="84" y="84" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  <rect x="116" y="84" width="30" height="30" fill="url(#iceCell)" rx="4"/>
  <rect x="148" y="84" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  
  <!-- Row 3 -->
  <rect x="20" y="116" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  <rect x="52" y="116" width="30" height="30" fill="url(#iceCell)" rx="4"/>
  <rect x="84" y="116" width="30" height="30" fill="url(#iceCell)" rx="4"/>
  <rect x="116" y="116" width="30" height="30" fill="url(#goalCell)" rx="4"/>
  <rect x="148" y="116" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  
  <!-- Row 4: walls -->
  <rect x="20" y="148" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  <rect x="52" y="148" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  <rect x="84" y="148" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  <rect x="116" y="148" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  <rect x="148" y="148" width="30" height="30" fill="url(#wallCell)" rx="4"/>
  
  <!-- Penguin player -->
  <text x="67" y="76" font-size="22" text-anchor="middle" dominant-baseline="middle">��</text>
  
  <!-- Goal flag -->
  <text x="131" y="140" font-size="18" text-anchor="middle" dominant-baseline="middle">🚩</text>
  
  <!-- Arrow showing path -->
  <path d="M 67 72 L 99 72 L 99 131 L 116 131" stroke="#38bdf8" stroke-width="3" fill="none" stroke-dasharray="5,3" stroke-linecap="round"/>
</svg>
