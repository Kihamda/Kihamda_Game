<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="table" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#78350f"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)"/>
  
  <!-- Table -->
  <rect x="0" y="150" width="200" height="50" fill="url(#table)"/>
  <rect x="0" y="150" width="200" height="3" fill="rgba(255,255,255,0.2)"/>
  
  <!-- Bottle (rotating) -->
  <g transform="translate(100, 90) rotate(25)">
    <!-- Body -->
    <rect x="-15" y="-10" width="30" height="60" rx="3" fill="url(#bottle)"/>
    <!-- Neck -->
    <rect x="-6" y="-30" width="12" height="22" rx="2" fill="url(#bottle)"/>
    <!-- Cap -->
    <rect x="-8" y="-38" width="16" height="10" rx="3" fill="#1e40af"/>
    <!-- Water -->
    <rect x="-12" y="20" width="24" height="25" rx="2" fill="rgba(59,130,246,0.5)"/>
    <!-- Highlight -->
    <rect x="-12" y="-5" width="5" height="40" rx="2" fill="rgba(255,255,255,0.3)"/>
  </g>
  
  <!-- Motion lines -->
  <path d="M50 60 Q60 55 55 65" stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M45 70 Q55 65 50 75" stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M55 50 Q65 45 60 55" stroke="#60a5fa" stroke-width="2" fill="none" opacity="0.3"/>
</svg>
