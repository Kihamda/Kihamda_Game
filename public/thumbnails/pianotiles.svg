<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="tileBlack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d2d44"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="tileTapped" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ecdc4"/>
      <stop offset="100%" style="stop-color:#26a69a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)"/>
  
  <!-- Lane lines -->
  <line x1="50" y1="0" x2="50" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="100" y1="0" x2="100" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <line x1="150" y1="0" x2="150" y2="200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  
  <!-- Black tiles -->
  <rect x="2" y="10" width="46" height="60" rx="3" fill="url(#tileBlack)" stroke="#3d3d5c" stroke-width="1"/>
  <rect x="102" y="40" width="46" height="60" rx="3" fill="url(#tileBlack)" stroke="#3d3d5c" stroke-width="1"/>
  <rect x="52" y="80" width="46" height="60" rx="3" fill="url(#tileBlack)" stroke="#3d3d5c" stroke-width="1"/>
  <rect x="152" y="110" width="46" height="60" rx="3" fill="url(#tileBlack)" stroke="#3d3d5c" stroke-width="1"/>
  
  <!-- Tapped tile effect -->
  <rect x="2" y="150" width="46" height="60" rx="3" fill="url(#tileTapped)" stroke="#4ecdc4" stroke-width="1" opacity="0.8"/>
  
  <!-- Tap indicator -->
  <circle cx="25" cy="180" r="12" fill="none" stroke="#fff" stroke-width="2" opacity="0.6"/>
  <circle cx="25" cy="180" r="6" fill="#fff" opacity="0.8"/>
  
  <!-- Title -->
  <text x="100" y="195" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#fff" opacity="0.5">PIANO TILES</text>
</svg>