<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a5f2a"/>
      <stop offset="100%" style="stop-color:#0d3d15"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bgGrad)" rx="20"/>
  <!-- カード1 (A♠) -->
  <g transform="translate(45, 50) rotate(-15, 35, 50)">
    <rect width="70" height="100" fill="#fff" rx="8" stroke="#333" stroke-width="2"/>
    <text x="35" y="45" font-size="28" font-weight="bold" fill="#1e293b" text-anchor="middle">A</text>
    <text x="35" y="78" font-size="32" fill="#1e293b" text-anchor="middle">♠</text>
  </g>
  <!-- カード2 (K♥) -->
  <g transform="translate(85, 50) rotate(15, 35, 50)">
    <rect width="70" height="100" fill="#fff" rx="8" stroke="#333" stroke-width="2"/>
    <text x="35" y="45" font-size="28" font-weight="bold" fill="#dc2626" text-anchor="middle">K</text>
    <text x="35" y="78" font-size="32" fill="#dc2626" text-anchor="middle">♥</text>
  </g>
  <!-- チップ -->
  <circle cx="100" cy="165" r="22" fill="#c9302c" stroke="#ffd700" stroke-width="4"/>
  <text x="100" y="172" font-size="18" font-weight="bold" fill="#fff" text-anchor="middle">21</text>
</svg>