<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87ceeb"/>
      <stop offset="60%" style="stop-color:#b0e0e6"/>
      <stop offset="60%" style="stop-color:#90ee90"/>
      <stop offset="100%" style="stop-color:#228b22"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#sky)"/>
  
  <!-- Target Stand -->
  <rect x="145" y="110" width="10" height="60" fill="#8b4513"/>
  
  <!-- Target -->
  <circle cx="150" cy="75" r="50" fill="#fff" stroke="#333" stroke-width="1"/>
  <circle cx="150" cy="75" r="40" fill="#000" stroke="#333" stroke-width="1"/>
  <circle cx="150" cy="75" r="30" fill="#0000ff" stroke="#333" stroke-width="1"/>
  <circle cx="150" cy="75" r="20" fill="#ff0000" stroke="#333" stroke-width="1"/>
  <circle cx="150" cy="75" r="10" fill="#ffd700" stroke="#333" stroke-width="1"/>
  <circle cx="150" cy="75" r="4" fill="#ffd700" stroke="#333" stroke-width="1"/>
  
  <!-- Bow -->
  <g transform="translate(45, 95)">
    <!-- Bow Arc -->
    <path d="M 0 -30 Q 25 0 0 30" stroke="#8b4513" stroke-width="5" fill="none"/>
    <!-- Bow String -->
    <line x1="0" y1="-30" x2="-10" y2="0" stroke="#ddd" stroke-width="2"/>
    <line x1="-10" y1="0" x2="0" y2="30" stroke="#ddd" stroke-width="2"/>
    <!-- Arrow -->
    <line x1="-10" y1="0" x2="35" y2="0" stroke="#8b4513" stroke-width="3"/>
    <polygon points="35,0 28,-4 28,4" fill="#555"/>
    <!-- Fletching -->
    <polygon points="-8,0 -15,-5 -5,0" fill="#ff6b6b"/>
    <polygon points="-8,0 -15,5 -5,0" fill="#ff6b6b"/>
  </g>
  
  <!-- Flying Arrow with trail -->
  <line x1="80" y1="80" x2="120" y2="75" stroke="rgba(139,69,19,0.4)" stroke-width="2" stroke-dasharray="3,3"/>
  <g transform="translate(125, 73) rotate(-3)">
    <line x1="-25" y1="0" x2="0" y2="0" stroke="#8b4513" stroke-width="2"/>
    <polygon points="0,0 -6,-3 -6,3" fill="#555"/>
  </g>
  
  <!-- Wind indicator -->
  <text x="100" y="180" font-family="sans-serif" font-size="12" fill="#333" text-anchor="middle">🏹 風 →→</text>
  
  <!-- Title -->
  <text x="100" y="195" font-family="sans-serif" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">ARCHERY</text>
</svg>
