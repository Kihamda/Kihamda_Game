<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f2e"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)"/>
  <!-- Stars -->
  <circle cx="30" cy="25" r="2" fill="#ffffff44"/>
  <circle cx="150" cy="35" r="1.5" fill="#ffffff44"/>
  <circle cx="80" cy="15" r="1" fill="#ffffff44"/>
  <circle cx="170" cy="55" r="2" fill="#ffffff44"/>
  <circle cx="45" cy="60" r="1" fill="#ffffff44"/>
  <!-- Tower blocks -->
  <rect x="60" y="160" width="80" height="20" fill="#ff6b6b" rx="2"/>
  <rect x="60" y="140" width="80" height="20" fill="#ffa502" rx="2"/>
  <rect x="65" y="120" width="70" height="20" fill="#ffd93d" rx="2"/>
  <rect x="70" y="100" width="60" height="20" fill="#6bcb77" rx="2"/>
  <rect x="75" y="80" width="50" height="20" fill="#4d96ff" rx="2"/>
  <!-- Moving block -->
  <rect x="100" y="55" width="50" height="20" fill="#845ec2" rx="2" opacity="0.9"/>
  <!-- Arrow indicators -->
  <path d="M90 65 L80 65 L85 60 Z" fill="#fff" opacity="0.6"/>
  <path d="M160 65 L170 65 L165 60 Z" fill="#fff" opacity="0.6"/>
  <!-- Highlight on blocks -->
  <rect x="60" y="160" width="80" height="4" fill="rgba(255,255,255,0.3)" rx="1"/>
  <rect x="60" y="140" width="80" height="4" fill="rgba(255,255,255,0.3)" rx="1"/>
  <rect x="65" y="120" width="70" height="4" fill="rgba(255,255,255,0.3)" rx="1"/>
  <rect x="70" y="100" width="60" height="4" fill="rgba(255,255,255,0.3)" rx="1"/>
  <rect x="75" y="80" width="50" height="4" fill="rgba(255,255,255,0.3)" rx="1"/>
</svg>
