<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1a1a2e"/>
  
  <!-- Grid lines -->
  <g stroke="#3a3a5a" stroke-width="1">
    <line x1="50" y1="30" x2="50" y2="170"/>
    <line x1="100" y1="30" x2="100" y2="170"/>
    <line x1="150" y1="30" x2="150" y2="170"/>
    <line x1="30" y1="50" x2="170" y2="50"/>
    <line x1="30" y1="100" x2="170" y2="100"/>
    <line x1="30" y1="150" x2="170" y2="150"/>
  </g>
  
  <!-- Lines -->
  <path d="M 50 50 L 50 100 L 100 100 L 100 150" stroke="#e74c3c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
  <path d="M 150 50 L 150 100 L 150 150" stroke="#3498db" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.8"/>
  
  <!-- Dots -->
  <circle cx="50" cy="50" r="15" fill="#e74c3c" stroke="#fff" stroke-width="2"/>
  <circle cx="100" cy="150" r="15" fill="#e74c3c" stroke="#fff" stroke-width="2"/>
  <circle cx="150" cy="50" r="15" fill="#3498db" stroke="#fff" stroke-width="2"/>
  <circle cx="150" cy="150" r="15" fill="#3498db" stroke="#fff" stroke-width="2"/>
</svg>
