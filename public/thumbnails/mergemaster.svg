<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="20"/>
  
  <!-- Grid -->
  <g transform="translate(35, 35)">
    <!-- Cell backgrounds -->
    <rect x="0" y="0" width="55" height="55" rx="8" fill="rgba(255,255,255,0.5)"/>
    <rect x="65" y="0" width="55" height="55" rx="8" fill="rgba(255,255,255,0.5)"/>
    <rect x="0" y="65" width="55" height="55" rx="8" fill="rgba(255,255,255,0.5)"/>
    <rect x="65" y="65" width="55" height="55" rx="8" fill="rgba(255,255,255,0.5)"/>
    
    <!-- Items -->
    <g transform="translate(27.5, 27.5)">
      <circle r="22" fill="#FFF9C4" stroke="#FFD54F" stroke-width="2"/>
      <text y="5" text-anchor="middle" font-size="24">🥚</text>
    </g>
    <g transform="translate(92.5, 27.5)">
      <circle r="22" fill="#FFF9C4" stroke="#FFD54F" stroke-width="2"/>
      <text y="5" text-anchor="middle" font-size="24">🥚</text>
    </g>
    <g transform="translate(27.5, 92.5)">
      <circle r="22" fill="#FFECB3" stroke="#FFC107" stroke-width="2"/>
      <text y="5" text-anchor="middle" font-size="24">🐣</text>
    </g>
    
    <!-- Merge arrow -->
    <path d="M60,27.5 L80,27.5 L75,22 M80,27.5 L75,33" stroke="#4caf50" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Title -->
  <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2e7d32">MERGE</text>
</svg>
