<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="50" y="50" width="1100" height="530" rx="20" fill="none" stroke="url(#accent)" stroke-width="4"/>
  <text x="600" y="260" text-anchor="middle" fill="#ffffff" font-family="sans-serif" font-size="72" font-weight="bold">🎮 ブラウザゲームポータル</text>
  <text x="600" y="340" text-anchor="middle" fill="#a0a0a0" font-family="sans-serif" font-size="36">今日の気分で遊べる無料ゲーム</text>
  <text x="600" y="500" text-anchor="middle" fill="#e94560" font-family="sans-serif" font-size="28">game.kihamda.net</text>
  <!-- Game icons -->
  <g fill="#4a4a6a" opacity="0.3">
    <rect x="100" y="420" width="60" height="60" rx="8"/>
    <rect x="180" y="420" width="60" height="60" rx="8"/>
    <rect x="260" y="420" width="60" height="60" rx="8"/>
    <rect x="880" y="420" width="60" height="60" rx="8"/>
    <rect x="960" y="420" width="60" height="60" rx="8"/>
    <rect x="1040" y="420" width="60" height="60" rx="8"/>
  </g>
</svg>
