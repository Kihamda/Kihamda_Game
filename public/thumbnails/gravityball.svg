<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#1a1a2e"/>
  <!-- Gravity arrow -->
  <line x1="100" y1="100" x2="100" y2="160" stroke="rgba(255,255,255,0.3)" stroke-width="4" stroke-linecap="round"/>
  <polygon points="100,170 90,150 110,150" fill="rgba(255,255,255,0.3)"/>
  <!-- Ball -->
  <circle cx="60" cy="60" r="20" fill="#4299e1"/>
  <circle cx="54" cy="54" r="6" fill="#63b3ed"/>
  <!-- Goal -->
  <circle cx="150" cy="150" r="25" fill="#48bb78"/>
  <circle cx="150" cy="150" r="15" fill="#276749"/>
  <text x="150" y="155" text-anchor="middle" fill="#48bb78" font-size="10" font-weight="bold">GOAL</text>
  <!-- Obstacle -->
  <rect x="80" y="100" width="60" height="10" fill="#4a5568" rx="2"/>
</svg>
