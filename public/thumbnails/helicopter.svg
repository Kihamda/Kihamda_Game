<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="terrain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d6a32"/>
      <stop offset="100%" style="stop-color:#2d4a22"/>
    </linearGradient>
    <linearGradient id="heli" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8c5a"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect width="200" height="200" fill="url(#sky)"/>
  
  <!-- 星 -->
  <circle cx="30" cy="40" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="80" cy="25" r="1" fill="rgba(255,255,255,0.5)"/>
  <circle cx="150" cy="35" r="1.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="170" cy="60" r="1" fill="rgba(255,255,255,0.4)"/>
  
  <!-- 天井 -->
  <rect x="0" y="0" width="200" height="35" fill="url(#terrain)"/>
  
  <!-- 床 -->
  <rect x="0" y="165" width="200" height="35" fill="url(#terrain)"/>
  
  <!-- 障害物上 -->
  <rect x="120" y="0" width="25" height="80" fill="#4a7c59"/>
  <rect x="120" y="0" width="4" height="80" fill="#5a9c69"/>
  
  <!-- 障害物下 -->
  <rect x="120" y="140" width="25" height="60" fill="#4a7c59"/>
  <rect x="120" y="140" width="4" height="60" fill="#5a9c69"/>
  
  <!-- ヘリコプター本体 -->
  <rect x="45" y="92" width="30" height="16" rx="3" fill="url(#heli)"/>
  
  <!-- コックピット -->
  <ellipse cx="73" cy="100" rx="8" ry="8" fill="#87ceeb"/>
  
  <!-- 尾部 -->
  <rect x="30" y="96" width="18" height="8" fill="url(#heli)"/>
  <rect x="24" y="90" width="8" height="12" fill="url(#heli)"/>
  
  <!-- メインローター -->
  <line x1="35" y1="88" x2="85" y2="88" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  
  <!-- テールローター -->
  <line x1="24" y1="86" x2="24" y2="98" stroke="#333" stroke-width="2" stroke-linecap="round"/>
  
  <!-- スキッド -->
  <path d="M48 108 L48 112 L44 112 L78 112 M73 108 L73 112" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- タイトル -->
  <text x="100" y="188" text-anchor="middle" font-size="14" font-weight="bold" fill="#00ff88">HELICOPTER</text>
</svg>