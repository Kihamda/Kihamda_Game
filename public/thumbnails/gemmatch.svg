    <rect x="34" y="34" width="28" height="28" rx="6" fill="#ef4444"/>
    <text x="48" y="56" text-anchor="middle" font-size="18">💎</text>
    
    <rect x="68" y="34" width="28" height="28" rx="6" fill="#ef4444"/>
    <text x="82" y="56" text-anchor="middle" font-size="18">💎</text>
    
    <rect x="102" y="34" width="28" height="28" rx="6" fill="#a855f7"/>
    <text x="116" y="56" text-anchor="middle" font-size="18">💜</text>
    
    <!-- Row 3 -->
    <rect x="0" y="68" width="28" height="28" rx="6" fill="#3b82f6"/>
    <text x="14" y="90" text-anchor="middle" font-size="18">💙</text>
    
    <rect x="34" y="68" width="28" height="28" rx="6" fill="#ef4444"/>
    <text x="48" y="90" text-anchor="middle" font-size="18">💎</text>
    
    <rect x="68" y="68" width="28" height="28" rx="6" fill="#f97316"/>
