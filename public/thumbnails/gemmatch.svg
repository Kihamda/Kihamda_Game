    <rect x="68" y="0" width="28" height="28" rx="6" fill="#3b82f6"/>
    <text x="82" y="22" text-anchor="middle" font-size="18">💙</text>
    
    <rect x="102" y="0" width="28" height="28" rx="6" fill="#eab308"/>
    <text x="116" y="22" text-anchor="middle" font-size="18">💛</text>
    
    <!-- Row 2 -->
    <rect x="0" y="34" width="28" height="28" rx="6" fill="#22c55e"/>
