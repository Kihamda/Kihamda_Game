<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#2d2d5a"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="50%" style="stop-color:#ffa500"/>
      <stop offset="100%" style="stop-color:#ffcc00;stop-opacity:0"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)"/>
  
  <!-- Stars -->
  <circle cx="30" cy="40" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="150" cy="30" r="2" fill="rgba(255,255,255,0.5)"/>
  <circle cx="170" cy="80" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="40" cy="150" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="160" cy="160" r="2" fill="rgba(255,255,255,0.5)"/>
  
  <!-- Obstacles -->
  <rect x="130" y="0" width="25" height="60" fill="#4a9f4a"/>
  <rect x="125" y="55" width="35" height="10" fill="#3d8b3d"/>
  <rect x="130" y="140" width="25" height="60" fill="#4a9f4a"/>
  <rect x="125" y="140" width="35" height="10" fill="#3d8b3d"/>
  
  <!-- Coins -->
  <circle cx="145" cy="100" r="10" fill="#ffd700"/>
  <circle cx="142" cy="97" r="4" fill="#ffec8b"/>
  
  <!-- Player body -->
  <rect x="55" y="75" width="30" height="40" rx="6" fill="#ff6b6b"/>
  
  <!-- Helmet -->
  <circle cx="70" cy="70" r="15" fill="#4ecdc4"/>
  <ellipse cx="73" cy="70" rx="8" ry="10" fill="#1a1a3e"/>
  
  <!-- Jetpack -->
  <rect x="45" y="80" width="12" height="25" fill="#666"/>
  <rect x="47" y="82" width="8" height="21" fill="#888"/>
  
  <!-- Flame -->
  <path d="M 60 115 Q 70 145 80 115" fill="url(#flame)"/>
  
  <!-- Particle effects -->
  <circle cx="55" cy="130" r="4" fill="rgba(255,150,50,0.6)"/>
  <circle cx="62" cy="140" r="3" fill="rgba(255,150,50,0.4)"/>
  <circle cx="75" cy="135" r="3.5" fill="rgba(255,150,50,0.5)"/>
</svg>
