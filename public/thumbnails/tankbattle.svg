<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="#4a5c4e"/>
  <!-- Ground texture -->
  <rect x="20" y="30" width="4" height="4" fill="#3d4f42"/>
  <rect x="80" y="60" width="4" height="4" fill="#3d4f42"/>
  <rect x="150" y="40" width="4" height="4" fill="#3d4f42"/>
  <rect x="60" y="120" width="4" height="4" fill="#3d4f42"/>
  <rect x="140" y="150" width="4" height="4" fill="#3d4f42"/>
  
  <!-- Walls -->
  <rect x="30" y="50" width="40" height="10" fill="#8b7355" stroke="#5a4a3a" stroke-width="2"/>
  <rect x="130" y="50" width="40" height="10" fill="#8b7355" stroke="#5a4a3a" stroke-width="2"/>
  <rect x="80" y="85" width="40" height="30" fill="#8b7355" stroke="#5a4a3a" stroke-width="2"/>
  
  <!-- Player Tank (blue) -->
  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="6" height="30" fill="#333"/>
    <rect x="24" y="0" width="6" height="30" fill="#333"/>
    <rect x="4" y="4" width="22" height="22" fill="#4cc9f0"/>
    <circle cx="15" cy="15" r="6" fill="#3498db"/>
    <rect x="12" y="-5" width="6" height="15" fill="#3498db"/>
  </g>
  
  <!-- Enemy Tank (red) -->
  <g transform="translate(120, 70) rotate(180)">
    <rect x="0" y="0" width="6" height="30" fill="#333"/>
    <rect x="24" y="0" width="6" height="30" fill="#333"/>
    <rect x="4" y="4" width="22" height="22" fill="#e74c3c"/>
    <circle cx="15" cy="15" r="6" fill="#c0392b"/>
    <rect x="12" y="-5" width="6" height="15" fill="#c0392b"/>
  </g>
  
  <!-- Bullets -->
  <circle cx="75" cy="100" r="4" fill="#ffff00"/>
  <circle cx="135" cy="125" r="4" fill="#ff6600"/>
  
  <!-- Title -->
  <text x="100" y="185" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">TANK BATTLE</text>
</svg>
