<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="dicebg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="diceface" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="640" height="360" fill="url(#dicebg)"/>
  <!-- 光の演出 -->
  <circle cx="320" cy="180" r="140" fill="rgba(78,205,196,0.1)"/>
  <circle cx="320" cy="180" r="100" fill="rgba(78,205,196,0.1)"/>
  <!-- サイコロ -->
  <rect x="240" y="100" width="160" height="160" rx="20" ry="20" fill="url(#diceface)" stroke="#ccc" stroke-width="3" filter="url(#glow)"/>
  <!-- 6の目 -->
  <circle cx="280" cy="140" r="12" fill="#1a1a2e"/>
  <circle cx="360" cy="140" r="12" fill="#1a1a2e"/>
  <circle cx="280" cy="180" r="12" fill="#1a1a2e"/>
  <circle cx="360" cy="180" r="12" fill="#1a1a2e"/>
  <circle cx="280" cy="220" r="12" fill="#1a1a2e"/>
  <circle cx="360" cy="220" r="12" fill="#1a1a2e"/>
  <!-- 矢印 -->
  <text x="120" y="200" font-size="60" font-weight="bold" fill="#5b9bd5" text-anchor="middle">⬇️</text>
  <text x="520" y="200" font-size="60" font-weight="bold" fill="#ff6b6b" text-anchor="middle">⬆️</text>
  <!-- ラベル -->
  <text x="120" y="250" font-size="18" font-weight="bold" fill="#5b9bd5" text-anchor="middle">LOW</text>
  <text x="520" y="250" font-size="18" font-weight="bold" fill="#ff6b6b" text-anchor="middle">HIGH</text>
  <!-- テキスト -->
  <text x="320" y="330" font-size="24" font-weight="bold" fill="#4ECDC4" text-anchor="middle">HIGH or LOW</text>
</svg>
