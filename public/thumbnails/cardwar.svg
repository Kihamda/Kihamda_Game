<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0f0f0"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)" rx="20"/>
  
  <!-- Card back (CPU) -->
  <g transform="translate(30, 35)">
    <rect width="55" height="77" rx="6" fill="url(#card2)" stroke="#fff" stroke-width="2"/>
    <text x="27.5" y="48" font-size="24" fill="#fff" opacity="0.5" text-anchor="middle">🂠</text>
  </g>
  
  <!-- Card front (Player) - Ace of Spades -->
  <g transform="translate(115, 88)">
    <rect width="55" height="77" rx="6" fill="url(#card1)" stroke="#ddd" stroke-width="1"/>
    <text x="27.5" y="35" font-size="22" fill="#1e293b" text-anchor="middle" font-weight="bold">A</text>
    <text x="27.5" y="62" font-size="26" fill="#1e293b" text-anchor="middle">♠</text>
  </g>
  
  <!-- VS text -->
  <text x="100" y="105" font-size="24" fill="#f59e0b" text-anchor="middle" font-weight="bold" 
        style="text-shadow: 2px 2px 4px rgba(0,0,0,0.5);">VS</text>
  
  <!-- Title -->
  <text x="100" y="185" font-size="16" fill="#fff" text-anchor="middle" font-weight="bold">CARD WAR</text>
</svg>