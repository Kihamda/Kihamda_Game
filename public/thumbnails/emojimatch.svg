    <rect x="195" y="90" width="60" height="40" rx="6" fill="rgba(255,255,255,0.9)"/><text x="225" y="120" text-anchor="middle" font-size="24">🏅</text>
    <rect x="260" y="90" width="60" height="40" rx="6" fill="rgba(255,255,255,0.9)"/><text x="290" y="120" text-anchor="middle" font-size="24">🥇</text>
    <rect x="325" y="90" width="60" height="40" rx="6" fill="rgba(255,255,255,0.9)"/><text x="355" y="120" text-anchor="middle" font-size="24">🥈</text>
    <rect x="390" y="90" width="60" height="40" rx="6" fill="rgba(255,255,255,0.9)"/><text x="420" y="120" text-anchor="middle" font-size="24">🥉</text>
    <rect x="455" y="90" width="60" height="40" rx="6" fill="rgba(255,255,255,0.9)"/><text x="485" y="120" text-anchor="middle" font-size="24">⚽</text>
