    <rect x="65" y="135" width="60" height="40" rx="6" fill="rgba(255,255,255,0.9)"/><text x="95" y="165" text-anchor="middle" font-size="24">🏈</text>
    <rect x="130" y="135" width="60" height="40" rx="6" fill="rgba(255,255,255,0.9)"/><text x="160" y="165" text-anchor="middle" font-size="24">⚾</text>
    <rect x="195" y="135" width="60" height="40" rx="6" fill="rgba(255,255,255,0.9)"/><text x="225" y="165" text-anchor="middle" font-size="24">🎾</text>
    <rect x="260" y="135" width="60" height="40" rx="6" fill="rgba(255,255,255,0.9)"/><text x="290" y="165" text-anchor="middle" font-size="24">🏐</text>
