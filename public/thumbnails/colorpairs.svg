<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>
  
  <!-- 4x4 Card Grid -->
  <g transform="translate(150, 40)" filter="url(#shadow)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="70" height="70" rx="10" fill="#ef4444"/>
    <rect x="85" y="0" width="70" height="70" rx="10" fill="#475569" stroke="#64748b" stroke-width="2"/>
    <text x="120" y="45" font-size="30" fill="#94a3b8" text-anchor="middle">?</text>
    <rect x="170" y="0" width="70" height="70" rx="10" fill="#22c55e"/>
    <rect x="255" y="0" width="70" height="70" rx="10" fill="#475569" stroke="#64748b" stroke-width="2"/>
    <text x="290" y="45" font-size="30" fill="#94a3b8" text-anchor="middle">?</text>
    
    <!-- Row 2 -->
    <rect x="0" y="85" width="70" height="70" rx="10" fill="#475569" stroke="#64748b" stroke-width="2"/>
    <text x="35" y="130" font-size="30" fill="#94a3b8" text-anchor="middle">?</text>
    <rect x="85" y="85" width="70" height="70" rx="10" fill="#3b82f6"/>
    <rect x="170" y="85" width="70" height="70" rx="10" fill="#475569" stroke="#64748b" stroke-width="2"/>
    <text x="205" y="130" font-size="30" fill="#94a3b8" text-anchor="middle">?</text>
    <rect x="255" y="85" width="70" height="70" rx="10" fill="#f97316"/>
    
    <!-- Row 3 -->
    <rect x="0" y="170" width="70" height="70" rx="10" fill="#8b5cf6"/>
    <rect x="85" y="170" width="70" height="70" rx="10" fill="#475569" stroke="#64748b" stroke-width="2"/>
    <text x="120" y="215" font-size="30" fill="#94a3b8" text-anchor="middle">?</text>
    <rect x="170" y="170" width="70" height="70" rx="10" fill="#06b6d4"/>
    <rect x="255" y="170" width="70" height="70" rx="10" fill="#475569" stroke="#64748b" stroke-width="2"/>
    <text x="290" y="215" font-size="30" fill="#94a3b8" text-anchor="middle">?</text>
  </g>
  
  <!-- Title -->
  <text x="320" y="330" font-family="Segoe UI, sans-serif" font-size="28" font-weight="bold" fill="#f8fafc" text-anchor="middle">Color Pairs</text>
</svg>
