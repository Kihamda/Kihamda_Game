<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background -->
  <rect width="192" height="192" fill="#1d4ed8" rx="40"/>
  
  <!-- Controller body -->
  <g transform="translate(96, 96)">
    <!-- Main body -->
    <path d="M -50 -20 Q -60 -20 -70 -10 L -70 10 Q -60 20 -50 20 L 50 20 Q 60 20 70 10 L 70 -10 Q 60 -20 50 -20 Z" fill="none" stroke="white" stroke-width="3"/>
    
    <!-- D-Pad (left side) -->
    <g transform="translate(-40, 0)">
      <!-- Vertical bar -->
      <rect x="-3" y="-8" width="6" height="16" fill="white"/>
      <!-- Horizontal bar -->
      <rect x="-8" y="-3" width="16" height="6" fill="white"/>
    </g>
    
    <!-- Buttons (right side) -->
    <g transform="translate(40, 0)">
      <!-- Top button (Y/Blue) -->
      <circle cx="0" cy="-8" r="4" fill="#60a5fa"/>
      <!-- Right button (A/Green) -->
      <circle cx="8" cy="0" r="4" fill="#34d399"/>
      <!-- Bottom button (X/Red) -->
      <circle cx="0" cy="8" r="4" fill="#f87171"/>
      <!-- Left button (B/Yellow) -->
      <circle cx="-8" cy="0" r="4" fill="#fbbf24"/>
    </g>
    
    <!-- Left trigger -->
    <path d="M -55 -22 L -50 -35 L -45 -22" fill="white"/>
    <!-- Right trigger -->
    <path d="M 55 -22 L 50 -35 L 45 -22" fill="white"/>
  </g>
</svg>
