name: Weekly Game Promotion

# 毎週月曜 9:00 JST (= UTC 0:00) に既存ゲームをランダム紹介
#
# 必要な GitHub Secrets (片方でも動作可):
#   Bluesky:
#     BLUESKY_HANDLE       - Bluesky ハンドル (例: kihamda.bsky.social)
#     BLUESKY_APP_PASSWORD - Bluesky App Password
#   Twitter / X:
#     TWITTER_API_KEY / TWITTER_API_SECRET
#     TWITTER_ACCESS_TOKEN / TWITTER_ACCESS_TOKEN_SECRET

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  post-weekly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick random game from games.json
        id: pick
        run: |
          node -e "
            const fs = require('fs');
            const games = JSON.parse(fs.readFileSync('src/portal/data/games.json', 'utf8')).games;
            const g = games[Math.floor(Math.random() * games.length)];
            console.log('title=' + g.title);
            console.log('description=' + g.description);
            console.log('url=https://game.kihamda.net' + g.path);
            console.log('tags=' + g.tags.join(','));
          " >> $GITHUB_OUTPUT

      - name: Compose post text
        id: compose
        run: |
          TITLE="${{ steps.pick.outputs.title }}"
          DESC="${{ steps.pick.outputs.description }}"
          URL="${{ steps.pick.outputs.url }}"

          cat <<- POSTEOF >> $GITHUB_OUTPUT
          text<<EOF
          🎮 今週のおすすめ！「${TITLE}」

          ${DESC}

          ▶ ${URL}

          #ブラウザゲーム #無料ゲーム #indiegame #WebGame
          EOF
          POSTEOF

      - name: Post to Bluesky
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          POST_TEXT: ${{ steps.compose.outputs.text }}
        run: |
          if [ -z "$BLUESKY_HANDLE" ]; then
            echo "⚠️  BLUESKY_HANDLE 未設定。Bluesky投稿をスキップ"
            exit 0
          fi
          cd /tmp && echo '{}' > package.json
          npm install --silent @atproto/api
          node - << 'SCRIPT'
          const atproto = require('@atproto/api');
          const Agent = atproto.BskyAgent || atproto.AtpAgent;
          async function main() {
            const agent = new Agent({ service: 'https://bsky.social' });
            await agent.login({
              identifier: process.env.BLUESKY_HANDLE,
              password: process.env.BLUESKY_APP_PASSWORD,
            });
            await agent.post({ text: process.env.POST_TEXT });
            console.log('✅ Bluesky投稿成功');
          }
          main().catch(e => { console.warn('⚠️ Bluesky投稿失敗:', e.message); });
          SCRIPT

      - name: Post to Twitter / X
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWEET_TEXT: ${{ steps.compose.outputs.text }}
        run: |
          if [ -z "$TWITTER_API_KEY" ]; then
            echo "⚠️  TWITTER_API_KEY 未設定。Twitter投稿をスキップ"
            exit 0
          fi
          cd /tmp && echo '{}' > package.json
          npm install --silent twitter-api-v2
          node - << 'SCRIPT'
          const { TwitterApi } = require('/tmp/node_modules/twitter-api-v2');
          const client = new TwitterApi({
            appKey: process.env.TWITTER_API_KEY,
            appSecret: process.env.TWITTER_API_SECRET,
            accessToken: process.env.TWITTER_ACCESS_TOKEN,
            accessSecret: process.env.TWITTER_ACCESS_TOKEN_SECRET,
          });
          client.v2.tweet(process.env.TWEET_TEXT)
            .then(r => { console.log('✅ Twitter投稿成功:', r.data.id); process.exit(0); })
            .catch(e => { console.warn('⚠️ Twitter投稿失敗:', e.message); process.exit(0); });
          SCRIPT
